server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name AFMCMESS.globalsparkteksolutions.com;

    ssl_certificate /etc/letsencrypt/live/globalsparkteksolutions.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/globalsparkteksolutions.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    root /var/www/AFMCMESSapplication;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* ^/.*\.(?:css|js|jpg|jpeg|png|gif|webp|ico|svg|woff2?|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable" always;
    }

    location /AFMCMESS/ {
        proxy_pass http://127.0.0.1:7700/AFMCMESS/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 90s;
        proxy_connect_timeout 10s;

        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,PATCH,DELETE,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    location ~ /\. {
        deny all;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    access_log /var/log/nginx/employee.access.log;
    error_log /var/log/nginx/employee.error.log warn;
}
